services:
  backend:
    build: ./flowstate-backend
    ports:
      - "5001:5001"
    env_file:
      - ./flowstate-backend/.env
    environment:
      - PORT=5001
      - NODE_ENV=development

  frontend:
    build:
      context: ./flowstate-frontend
      args:
        - REACT_APP_API_URL=http://localhost:5001/api
    ports:
      - "3000:80"
    depends_on:
      - backend
