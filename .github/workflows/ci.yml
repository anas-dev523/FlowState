name: CI - FlowState

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend - Install & Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: flowstate-backend/package-lock.json

      - name: Install dependencies
        working-directory: flowstate-backend
        run: npm install

  frontend:
    name: Frontend - Install & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: flowstate-frontend/package-lock.json

      - name: Install dependencies
        working-directory: flowstate-frontend
        run: npm install

      - name: Run tests
        working-directory: flowstate-frontend
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build React app
        working-directory: flowstate-frontend
        env:
          CI: false
        run: npm run build
